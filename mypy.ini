[mypy]
# backend/services/*.py are sibling modules with no __init__.py (see CLAUDE.md
# "Architecture" -document_logic.py inserts its own directory onto sys.path at
# runtime so `import document_logic`/`from storage import ...`/`from tokens
# import ...` resolve the same way whether it's run directly or imported as
# `services.document_logic`). Running `mypy backend/services` directly works
# without this, since mypy treats a bare directory argument as its own search
# root; but tests/ imports those same modules by name too (via
# tests/conftest.py's runtime sys.path.insert, which mypy can't see), so
# mypy_path adds backend/services as an extra search root for every mypy
# invocation, not just ones rooted there.
mypy_path = backend/services

[mypy-botocore.*]
# botocore has no bundled type stubs/py.typed marker. It's a lazy import
# inside AlmacenamientoS3 (see storage.py) -a ready-to-wire reference
# implementation nothing currently instantiates- so pulling in a stub package
# (types-boto3/boto3-stubs) just to type-check a module nothing uses yet would
# be pure overhead. Ignore missing imports for this one third-party package
# instead of a blanket ignore_missing_imports, which would hide real
# import-not-found bugs everywhere else.
ignore_missing_imports = True
