# This workflow installs the app via the project Makefile, lints with flake8,
# and runs pytest against tests/ (see CLAUDE.md).
# flake8 runs as a single, fully-enforced pass — no `--exit-zero`. That flag
# used to make the style/complexity check always report success regardless
# of how many violations it found, which let real lint failures sit
# unnoticed as "statistics" instead of failing the build.
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python package

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v7
    - name: Set up Python 3.11
      uses: actions/setup-python@v7
      with:
        python-version: "3.11"
    - name: Install dependencies with Makefile
      run: |
        make install
    - name: Install lint/test tools
      run: |
        venv/bin/pip install flake8 mypy pytest
    - name: Lint with flake8
      run: |
        # No --exit-zero: every violation here fails the build. 127 chars matches the GitHub editor width.
        venv/bin/flake8 . --count --exclude=venv --max-complexity=10 --max-line-length=127 --show-source --statistics
    - name: Type-check with mypy
      run: |
        venv/bin/mypy backend/services tests
    - name: Test with pytest
      run: |
        venv/bin/pytest tests/
