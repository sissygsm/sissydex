name: Python package

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v7 # Mantenemos v7 para evitar advertencias de deprecación
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v6 # Mantenemos v6
      with:
        python-version: "3.11"
        cache: 'pip' # <-- LA MEJORA ADOPTADA: Activa la caché nativa de GitHub
        cache-dependency-path: 'backend/requirements.txt' # Monitorea tu archivo de dependencias

    - name: Install dependencies with Makefile
      run: |
        make install

    - name: Install lint/test tools
      run: |
        venv/bin/pip install flake8 mypy pytest

    - name: Lint with flake8
      run: |
        # No --exit-zero: every violation here fails the build. 127 chars matches the GitHub editor width.
        venv/bin/flake8 . --count --exclude=venv --max-complexity=10 --max-line-length=127 --show-source --statistics

    - name: Type-check with mypy
      run: |
        venv/bin/mypy backend/services tests

    - name: Test with pytest
      run: |
        venv/bin/pytest tests/ -v
